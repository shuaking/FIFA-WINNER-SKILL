name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        id: pages
        continue-on-error: true
      - name: Skip when GitHub Pages is not enabled
        if: steps.pages.outcome == 'failure'
        run: |
          echo "::notice title=GitHub Pages is not enabled::Open repository Settings -> Pages and set Source to GitHub Actions, then rerun this workflow."
      - uses: actions/upload-pages-artifact@v3
        if: steps.pages.outcome == 'success'
        with:
          path: wiki/public/2026/wiki
      - id: deployment
        if: steps.pages.outcome == 'success'
        uses: actions/deploy-pages@v4
